    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { font-size: 18px; margin-top: 28px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    th, td { border: 1px solid var(--border); padding: 10px 12px; text-align: left; }
    .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 20px; }
    .links a { display: block; padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--accent); font-weight: 500; }
