    <div class="card">
      <h1>商业授权（可选）</h1>
      <p>MIT 已允许免费商用开店。<strong>商业授权只对品牌与分发权收费</strong>，不限制源码访问。</p>
      <table>
        <thead><tr><th>商品 code</th><th>名称</th><th>适用</th></tr></thead>
        <tbody>
          <tr><td><code>branding-removal</code></td><td>去版权授权</td><td>隐藏 Powered by</td></tr>
          <tr><td><code>white-label</code></td><td>白标授权</td><td>单站自定义品牌</td></tr>
          <tr><td><code>agency-license</code></td><td>服务商授权</td><td>多客户白标交付</td></tr>
          <tr><td><code>enterprise-license</code></td><td>企业授权</td><td>SLA + 定制条款</td></tr>
        </tbody>
      </table>
      <h2>购买后激活</h2>
      <ol>
        <li>在应用市场购买并绑定域名</li>
        <li>商家后台 → 应用市场设置 → 绑定 Domain Token</li>
        <li>点击「刷新授权状态」</li>
      </ol>
      <a class="btn" href="https://marketplace.niceshoply.com/marketplace?category=plugins&sub_category=commercial-license">前往应用市场购买</a>
